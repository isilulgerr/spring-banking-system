spring.application.name=bankingsystem
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=bankingsystem
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Döviz Kuru API Ayarlari (API Key Güvenliği İçin Çevre Değişkeni Kullanılıyor)
exchange.api.key=${EXCHANGE_API_KEY:}
